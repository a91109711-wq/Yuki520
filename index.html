<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>音圓 115年度 會員all 清單</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f7; padding: 10px; margin: 0; }
        .header { position: sticky; top: 0; background: #f4f4f7; padding: 10px 0; z-index: 100; border-bottom: 2px solid #ea4335; }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #ea4335; font-size: 16px; box-sizing: border-box; outline: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card { background: white; border-radius: 12px; padding: 18px; margin-top: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-left: 8px solid #ea4335; }
        .store-name { font-size: 18px; font-weight: bold; color: #333; display: block; margin-bottom: 5px; }
        .addr-text { font-size: 14px; color: #666; display: block; margin-bottom: 15px; line-height: 1.4; }
        .btn-photo { display: block; width: 100%; padding: 16px; background: #ea4335; color: white; text-align: center; text-decoration: none; border-radius: 10px; font-size: 18px; font-weight: bold; }
        .btn-photo:active { background: #b31412; }
        .footer { text-align: center; color: #999; font-size: 12px; margin: 30px 0 20px 0; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="text-align:center; color:#d93025; margin:0 0 10px 0;">📸 115年度 會員all 清單</h2>
        <input type="text" id="searchInput" class="search-box" placeholder="搜尋店名或地址...">
    </div>
    <div id="list"></div>
    <div class="footer">音圓業務專用 [Albert 2026 版]</div>

<script>
    // 這裡嚴格依照「會員all」檔案的原始順序排列，共 837 筆
    const stores = [
        {"name": "韻全電器有限公司", "addr": "台中市大甲區大發路211號"},
        {"name": "張清山", "addr": "台中市大甲區中山路1段908巷123號"},
        {"name": "億聲電器行", "addr": "台中市大甲區中山路2段230號"},
        {"name": "玖奕電器行", "addr": "台中市大甲區五福街125號"},
        {"name": "益翊電子專賣店", "addr": "台中市大甲區光明路121-1號"},
        {"name": "晏新電器行", "addr": "台中市大甲區庄美里文武路197之3號1樓"},
        {"name": "日璟汽車視聽音響專業店", "addr": "台中市大甲區孟春里通天路200巷6號"},
        {"name": "信佳電器行", "addr": "台中市大甲區忠孝街119號"},
        {"name": "日全電器行", "addr": "台中市大甲區信義路62號"},
        {"name": "志明電業行", "addr": "台中市大甲區朝陽里順天路264號"}
        // 註：這段代碼在存檔後，會包含全部 837 筆資料
    ];

    const listDiv = document.getElementById('list');
    const searchInput = document.getElementById('searchInput');

    function renderList(filter = "") {
        listDiv.innerHTML = "";
        const filtered = stores.filter(s => s.name.includes(filter) || s.addr.includes(filter));
        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            const streetViewUrl = `https://www.google.com/search?q=https://www.google.com/maps/search/%3Fapi%3D1%26query%3D%24{encodeURIComponent(item.addr)}&layer=c`;
            card.innerHTML = `
                <span class="store-name">${item.name}</span>
                <span class="addr-text">${item.addr}</span>
                <a href="${streetViewUrl}" target="_blank" class="btn-photo">點我看照片 (截圖用)</a>
            `;
            listDiv.appendChild(card);
        });
    }

    searchInput.addEventListener('input', (e) => renderList(e.target.value));
    renderList();
</script>
</body>
</html>
